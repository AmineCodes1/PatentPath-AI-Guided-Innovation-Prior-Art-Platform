name: PatentPath CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-tests-and-lint:
    name: Backend Tests and Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov ruff

      - name: Run backend tests with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-secret-key
          EPO_CONSUMER_KEY: dummy
          EPO_CONSUMER_SECRET: dummy
          ANTHROPIC_API_KEY: dummy
          CORS_ORIGINS: http://localhost:5173
        run: pytest backend/tests/ --cov=backend/app --cov-report=term-missing

      - name: Ruff lint backend
        run: ruff check backend/

  frontend-eslint:
    name: Frontend ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install eslint toolchain
        run: npm install --no-save eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin eslint-plugin-react-hooks eslint-plugin-react-refresh
        working-directory: frontend

      - name: Run eslint on TypeScript source
        run: |
          npx eslint src/ --ext .ts,.tsx --no-config-lookup \
            --parser @typescript-eslint/parser \
            --plugin @typescript-eslint \
            --plugin react-hooks \
            --plugin react-refresh \
            --rule "@typescript-eslint/no-explicit-any:error"
        working-directory: frontend

  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
